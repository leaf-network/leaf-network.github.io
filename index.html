<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaf Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Bungee', cursive;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #000000;
            pointer-events: none;
            z-index: 0;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(135, 206, 235, 0.3);
            border-radius: 50%;
            animation: rise 8s infinite ease-in-out;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 70%; animation-delay: 1s; }
        .particle:nth-child(5) { left: 80%; animation-delay: 3s; }
        .particle:nth-child(6) { left: 90%; animation-delay: 5s; }

        @keyframes rise {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .icon {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            animation: float 6s ease-in-out infinite;
            opacity: 0.9;
        }

        .text {
            font-size: 72px;
            font-weight: 400;
            color: #87CEEB;
            letter-spacing: 3px;
            animation: float 6s ease-in-out infinite;
            animation-delay: 0.3s;
            text-shadow: 0 0 30px rgba(135, 206, 235, 0.8),
                         0 0 60px rgba(135, 206, 235, 0.4);
            opacity: 0.95;
            line-height: 1.2;
            text-decoration: none;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .icon {
            animation: float 6s ease-in-out infinite, pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(135, 206, 235, 0.6));
            }
            50% {
                filter: drop-shadow(0 0 35px rgba(135, 206, 235, 0.9));
            }
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .icon {
                width: 100px;
                height: 100px;
            }
            .text {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    
    <div class="container">
        <img src="img/icon.jpeg" alt="Leaf Icon" class="icon">
      <h1 class="text"><a href="https://github.com/leaf-network" class="text">Leaf Network</a></h1>
    </div>
</body>
